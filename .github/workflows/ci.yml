name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Restore syntax cache
        id: syntax-cache
        uses: actions/cache/restore@v4
        with:
          path: integration-test/.rudis
          key: ${{ runner.os }}-syntax-definition-${{ hashFiles('Cargo.lock', 'src/process_data/markdown/resolver/codeblock/syntax/*.sublime-syntax') }}
          restore-keys: |
            ${{ runner.os }}-syntax-definition-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features

      - name: Build check
        run: cargo build --all-features

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Generate schema
        run: sh ./integration-test/prepare.sh

      - name: Integration test
        run: bun test

      - name: Save syntax cache
        if: always() && steps.syntax-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: integration-test/.rudis
          key: ${{ steps.syntax-cache.outputs.cache-primary-key }}
