name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      release_id: ${{ steps.create_release.outputs.id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

  build:
    name: Build ${{ matrix.asset_name }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset_name: rudis-cms-linux-musl-amd64
            build_command: cargo build --release --all-features --target=x86_64-unknown-linux-musl
            install_cross: false
            install_musl_tools: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            asset_name: rudis-cms-linux-musl-aarch64
            build_command: cross build --release --all-features --target=aarch64-unknown-linux-musl
            install_cross: true
            install_musl_tools: false
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: rudis-cms-darwin-aarch64
            build_command: cargo build --release --all-features --target=aarch64-apple-darwin
            install_cross: false
            install_musl_tools: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install musl tools
        if: matrix.install_musl_tools
        run: sudo apt install -qq -y musl-tools --no-install-recommends

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.install_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: ${{ matrix.build_command }}
        env:
          RUSTFLAGS: -C strip=symbols

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: target/${{ matrix.target }}/release/rudis-cms
          asset_name: ${{ matrix.asset_name }}
          asset_content_type: application/octet-stream
